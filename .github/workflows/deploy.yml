name: Deploy Folio to VPS

# Triggered automatically once the Build workflow succeeds, or manually.
on:
  workflow_run:
    workflows: ["Build Folio Image"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  deploy-to-vps:
    # Only run if the build succeeded OR it was a manual trigger
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy App on Server
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          # 1. Setup environment to talk to the user-level systemd daemon
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
          export DBUS_SESSION_BUS_ADDRESS=unix:path=${XDG_RUNTIME_DIR}/bus

          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/folio:latest

          # 2. Ensure directory exists and update secrets
          mkdir -p ~/apps/folio
          echo "Writing the secure .env file..."
          echo "$PROD_ENV_FILE" > ~/apps/folio/.env
          chmod 600 ~/apps/folio/.env

          # 3. Pull the fresh image
          echo "Pulling the latest image..."
          podman pull $IMAGE_NAME

          # 4. RESTART THE SERVICE (Systemd handles the container stop/start/replace)
          echo "Restarting the folio systemd service..."
          systemctl --user restart folio

          # 5. Verification
          echo "Verifying service status..."
          systemctl --user is-active folio

          echo "Deployment Successful!"
