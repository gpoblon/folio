name: Deploy Folio Fullstack

# Workflow is triggered manually from the GitHub Actions UI
on:
  workflow_dispatch:

# Give GitHub token permission to push to the registry
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push via Podman
        # Ubuntu runners have Podman installed by default!
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/folio:latest
          podman build -t $IMAGE_NAME .
          podman push $IMAGE_NAME

  deploy-to-vps:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Deploy App on Server
        env:
          # Pass your secret into the environment so the script can use it
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/folio:latest

          mkdir -p ~/apps/folio

          echo "Writing the secure .env file..."
          echo "$PROD_ENV_FILE" > /apps/folio/.env
          chmod 600 /apps/folio/.env

          # Since the runner just built the image in the previous step,
          # it is likely already logged into ghcr.io, but we can pull directly!
          echo "Pulling the latest image..."
          podman pull $IMAGE_NAME

          echo "Restarting the container..."
          podman run -d --replace \
            --name folio \
            -p 127.0.0.1:9001:8080 \
            --env-file ~/apps/folio/.env \
            $IMAGE_NAME

          echo "Deployment Successful!"
