name: Deploy Folio to VPS

# Triggered automatically once the Build workflow succeeds, or manually.
on:
  workflow_run:
    workflows: ["Build Folio Image"]
    types: [completed]
  workflow_dispatch:

# Only run if the triggering build actually succeeded (no-op for manual trigger).
# The condition is evaluated per-job so manual dispatches always proceed.
permissions:
  contents: read
  packages: read

jobs:
  deploy-to-vps:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy App on Server
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/folio:latest

          mkdir -p ~/apps/folio

          echo "Writing the secure .env file..."
          echo "$PROD_ENV_FILE" > ~/apps/folio/.env
          chmod 600 ~/apps/folio/.env

          echo "Pulling the latest image..."
          podman pull $IMAGE_NAME

          echo "Restarting the container..."
          podman run -d --replace \
            --name folio \
            -p 127.0.0.1:9001:8080 \
            --env-file ~/apps/folio/.env \
            $IMAGE_NAME

          echo "Deployment Successful!"
