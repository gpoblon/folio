[package]
name = "kernel"
version = "0.1.0"
edition = "2024"

[dependencies]
dioxus = { workspace = true }
dioxus-i18n = { version = "0.5.1" }
strum.workspace = true
serde.workspace = true
anyhow = { version = "1.0" }
thiserror = "2.0.18"
bon = "3.8.2"
toml = "1.0"

# server-only features
lettre = { version = "0.11", default-features = false, features = ["serde", "tokio1-rustls", "builder", "smtp-transport", "rustls-tls"], optional = true }
secrecy = { version = "0.10.3", features = ["serde"], optional = true }

[features]
server = ["dioxus/server", "dep:lettre", "dep:secrecy"]
